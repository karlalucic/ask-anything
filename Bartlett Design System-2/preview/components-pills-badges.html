<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:28px 32px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .pill{height:36px;padding:0 16px;border-radius:8px;display:inline-flex;align-items:center;font-size:13px;cursor:pointer;transition:all 150ms;border:1px solid #E5E5E5;color:#404040;background:#fff}
  .pill:hover{border-color:#A3A3A3}
  .pill.selected{background:#0A0A0A;color:#fff;border-color:#0A0A0A}
  .badge{display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:9999px;font-size:11px;font-weight:500}
  .b-done{background:#0A0A0A;color:#fff}
  .b-active{border:1px solid #E5E5E5;color:#525252;background:#fff}
  .b-failed{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
  .b-canceled{border:1px solid #E5E5E5;color:#A3A3A3;background:#fff}
  .group{display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%}
  .lbl{font-size:11px;color:#a3a3a3;letter-spacing:.04em;text-transform:uppercase;min-width:64px;font-weight:500}
</style></head>
<body>
<div class="card">
  <div class="group"><div class="lbl">Pills</div>
    <div class="pill selected">5 min</div>
    <div class="pill">20 min</div>
    <div class="pill">60 min</div>
  </div>
  <div class="group"><div class="lbl">Badges</div>
    <div class="badge b-done">complete</div>
    <div class="badge b-active">drafting</div>
    <div class="badge b-failed">failed</div>
    <div class="badge b-canceled">canceled</div>
  </div>
</div>
</body></html>
