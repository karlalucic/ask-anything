<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:24px 32px}
  .player{border:1px solid #F5F5F5;background:rgba(247,247,247,0.5);border-radius:12px;padding:20px 24px}
  .controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:14px}
  .skip{color:#737373;font-size:12px;cursor:pointer;font-weight:500;letter-spacing:.02em}
  .skip:hover{color:#0A0A0A}
  .play{width:56px;height:36px;border:1px solid #E5E5E5;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .play:hover{border-color:#A3A3A3}
  .play svg{width:12px;height:12px}
  .track{height:2px;background:#E5E5E5;border-radius:9999px;position:relative;margin-bottom:8px}
  .fill{position:absolute;left:0;top:0;height:100%;width:32%;background:#0A0A0A;border-radius:9999px}
  .thumb{position:absolute;left:32%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:#0A0A0A;border-radius:50%}
  .times{display:flex;justify-content:space-between;font-size:11px;color:#A3A3A3;font-variant-numeric:tabular-nums}
</style></head>
<body>
<div class="card">
  <div class="player">
    <div class="controls">
      <div class="skip">−15</div>
      <div class="play"><svg viewBox="0 0 12 12" fill="#0A0A0A"><path d="M2 1 L10 6 L2 11 Z"/></svg></div>
      <div class="skip">+30</div>
    </div>
    <div class="track"><div class="fill"></div><div class="thumb"></div></div>
    <div class="times"><span>5:48</span><span>18:02</span></div>
  </div>
</div>
</body></html>
