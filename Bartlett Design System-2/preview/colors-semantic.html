<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:24px 32px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:center;gap:14px}
  .swatch{width:56px;height:56px;border-radius:10px;flex-shrink:0;border:1px solid rgba(0,0,0,0.06)}
  .meta{display:flex;flex-direction:column;gap:2px}
  .name{font-size:13px;font-weight:500;color:#0A0A0A}
  .hex{font-size:11px;color:#a3a3a3;font-family:ui-monospace,Menlo,monospace}
  .role{font-size:11px;color:#737373;margin-left:auto}
</style></head>
<body>
<div class="card">
  <div class="row"><div class="swatch" style="background:#E5E5E5"></div><div class="meta"><div class="name">Border</div><div class="hex">#E5E5E5 · 0 0% 90%</div></div><div class="role">Hairline</div></div>
  <div class="row"><div class="swatch" style="background:#F5F5F5"></div><div class="meta"><div class="name">Border hairline</div><div class="hex">#F5F5F5 · neutral-100</div></div><div class="role">Card default</div></div>
  <div class="row"><div class="swatch" style="background:#C17F2A"></div><div class="meta"><div class="name">Accent · amber</div><div class="hex">#C17F2A · 28 72% 42%</div></div><div class="role">Used sparingly</div></div>
  <div class="row"><div class="swatch" style="background:#DC2626"></div><div class="meta"><div class="name">Destructive</div><div class="hex">#DC2626 · 0 72% 50%</div></div><div class="role">Errors only</div></div>
</div>
</body></html>
