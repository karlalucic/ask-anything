<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:28px 32px}
  .pair{display:flex;align-items:center;gap:20px;margin-bottom:22px}
  .pair:last-child{margin-bottom:0}
  .big{font-size:36px;line-height:1.1;color:#0A0A0A;letter-spacing:-0.015em;flex:1}
  .serif{font-family:'Instrument Serif',serif;font-weight:400}
  .sans{font-family:'Inter',sans-serif;font-weight:400}
  .tag{font-family:'Inter',sans-serif;font-size:10px;color:#a3a3a3;letter-spacing:.08em;text-transform:uppercase;font-weight:500;width:56px;flex-shrink:0}
</style></head>
<body>
<div class="card">
  <div class="pair"><div class="tag">Display</div><div class="big serif">Instrument Serif</div></div>
  <div class="pair"><div class="tag">Body</div><div class="big sans">Inter Regular</div></div>
</div>
</body></html>
