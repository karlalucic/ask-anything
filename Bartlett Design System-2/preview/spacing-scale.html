<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:24px 32px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;align-items:center;gap:14px}
  .box{border-radius:8px;flex-shrink:0;background:#F5F5F5;border:1px solid #E5E5E5}
  .label{font-size:12px;color:#0A0A0A;font-weight:500;min-width:52px}
  .token{font-size:11px;color:#a3a3a3;font-family:ui-monospace,Menlo,monospace;margin-left:auto}
</style></head>
<body>
<div class="card">
  <div class="row"><div class="label">4</div><div class="box" style="width:4px;height:4px"></div><div class="token">--space-1</div></div>
  <div class="row"><div class="label">8</div><div class="box" style="width:8px;height:8px"></div><div class="token">--space-2</div></div>
  <div class="row"><div class="label">16</div><div class="box" style="width:16px;height:16px"></div><div class="token">--space-4</div></div>
  <div class="row"><div class="label">24</div><div class="box" style="width:24px;height:24px"></div><div class="token">--space-6</div></div>
  <div class="row"><div class="label">48</div><div class="box" style="width:48px;height:16px"></div><div class="token">--space-12</div></div>
  <div class="row"><div class="label">64</div><div class="box" style="width:64px;height:16px"></div><div class="token">--space-16</div></div>
  <div class="row"><div class="label">128</div><div class="box" style="width:128px;height:16px"></div><div class="token">--space-32 (hero)</div></div>
</div>
</body></html>
