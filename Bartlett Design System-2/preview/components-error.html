<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:24px 32px}
  .err{border:1px solid #FECACA;background:#FEF2F2;border-radius:12px;padding:16px 20px}
  .head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .title{font-size:14px;font-weight:500;color:#991B1B}
  .prov{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:9999px;font-size:10px;font-weight:500;background:#fff;color:#991B1B;border:1px solid #FECACA;margin-left:auto}
  .msg{font-size:13px;color:#B91C1C;line-height:1.5;margin-bottom:10px}
  .actions{display:flex;gap:10px}
  .btn{font-size:13px;padding:0 12px;height:32px;border-radius:8px;cursor:pointer;font-family:inherit}
  .primary{background:#0A0A0A;color:#fff;border:none}
  .ghost{background:transparent;color:#737373;border:none}
</style></head>
<body>
<div class="card">
  <div class="err">
    <div class="head">
      <div class="title">Drafting · E_TIMEOUT</div>
      <div class="prov">openai · 504</div>
    </div>
    <div class="msg">We lost the connection mid-chapter. Your progress is saved — you can resume from chapter 4.</div>
    <div class="actions"><button class="btn primary">Resume</button><button class="btn ghost">Report</button></div>
  </div>
</div>
</body></html>
