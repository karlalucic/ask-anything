<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:16px}
  .label{font-family:'Inter',sans-serif;font-size:11px;color:#a3a3a3;letter-spacing:.04em;text-transform:uppercase;min-width:96px}
  .specimen{font-family:'Inter',sans-serif;color:#0A0A0A;line-height:1.3}
  .muted{color:#737373}
  .eyebrow{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#737373}
</style></head>
<body>
<div class="card">
  <div class="row"><div class="label">18 / lead</div><div class="specimen" style="font-size:18px;font-weight:400" class="muted">Type a subject. Choose how deep to go.</div></div>
  <div class="row"><div class="label">16 / base</div><div class="specimen" style="font-size:16px;font-weight:400">What do you want to learn about?</div></div>
  <div class="row"><div class="label">14 / sm</div><div class="specimen" style="font-size:14px;font-weight:500">The physics of fermentation</div></div>
  <div class="row"><div class="label">14 / meta</div><div class="specimen muted" style="font-size:14px">Apr 12 · 18 min · complete</div></div>
  <div class="row"><div class="label">12 / xs</div><div class="specimen" style="font-size:12px;color:#a3a3a3">3/8 chapters</div></div>
  <div class="row"><div class="label">12 / eyebrow</div><div class="eyebrow">Style card</div></div>
</div>
</body></html>
