<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:24px 32px;display:flex;flex-direction:column;gap:14px}
  label{font-size:13px;font-weight:500;color:#0A0A0A;display:block;margin-bottom:6px}
  input,textarea{width:100%;box-sizing:border-box;font-family:inherit;font-size:14px;color:#0A0A0A;border:1px solid #E5E5E5;border-radius:8px;padding:10px 12px;background:#fff;outline:none;transition:border-color 150ms;resize:none}
  input:focus,textarea:focus{border-color:#0A0A0A}
  input::placeholder,textarea::placeholder{color:#A3A3A3}
  .row{display:flex;gap:10px}
  .row input{flex:1}
  button{font-family:inherit;font-size:14px;border:1px solid #E5E5E5;background:#fff;color:#0A0A0A;border-radius:8px;padding:0 14px;height:40px;cursor:pointer}
  button:hover{border-color:#A3A3A3}
</style></head>
<body>
<div class="card">
  <div>
    <label>What do you want to learn about?</label>
    <textarea rows="2" placeholder="e.g. Why the Dutch Republic became a financial superpower"></textarea>
  </div>
  <div>
    <label>Writing style</label>
    <div class="row"><input placeholder="An author, publication, or a style"><button>Analyze</button></div>
  </div>
</div>
</body></html>
