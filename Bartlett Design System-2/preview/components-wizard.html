<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:24px 32px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:center;gap:10px;font-size:12px;color:#737373}
  .step{display:inline-flex;align-items:center;gap:6px}
  .step.active{color:#0A0A0A;font-weight:500}
  .sep{color:#D4D4D4}
  .voices{display:flex;flex-direction:column;gap:8px}
  .voice{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid #E5E5E5;border-radius:12px;cursor:pointer;transition:all 150ms}
  .voice:hover{border-color:#A3A3A3}
  .voice.selected{background:#0A0A0A;color:#fff;border-color:#0A0A0A}
  .vn{font-size:14px;font-weight:500}
  .vd{font-size:13px;color:#737373}
  .voice.selected .vd{color:#D4D4D4}
</style></head>
<body>
<div class="card">
  <div class="row">
    <span class="step">Topic</span><span class="sep">›</span>
    <span class="step">Style</span><span class="sep">›</span>
    <span class="step">Sources</span><span class="sep">›</span>
    <span class="step active">Voice</span><span class="sep">›</span>
    <span class="step">Review</span>
  </div>
  <div class="voices">
    <div class="voice selected"><div class="vn">Eve</div><div class="vd">Energetic, upbeat</div></div>
    <div class="voice"><div class="vn">Mercer</div><div class="vd">Warm, measured baritone</div></div>
  </div>
</div>
</body></html>
