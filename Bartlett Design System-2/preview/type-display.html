<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:18px}
  .row{display:flex;align-items:baseline;gap:16px}
  .label{font-family:var(--font-body);font-size:11px;color:#a3a3a3;letter-spacing:.04em;text-transform:uppercase;min-width:72px}
  .specimen{font-family:'Instrument Serif',serif;color:#0A0A0A;letter-spacing:-0.015em;line-height:1}
</style></head>
<body>
<div class="card">
  <div class="row"><div class="label">48 / hero</div><div class="specimen" style="font-size:48px">Any topic.</div></div>
  <div class="row"><div class="label">30 / h2</div><div class="specimen" style="font-size:30px">Narrated in minutes.</div></div>
  <div class="row"><div class="label">24 / h3</div><div class="specimen" style="font-size:24px">Recent briefings</div></div>
  <div class="row"><div class="label">20 / logo</div><div class="specimen" style="font-size:20px">Bartlett</div></div>
</div>
</body></html>
