<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:24px 32px;display:flex;gap:20px;align-items:center;justify-content:space-around}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px}
  .shape{width:64px;height:64px;background:#F5F5F5;border:1px solid #E5E5E5}
  .name{font-size:12px;color:#0A0A0A;font-weight:500}
  .token{font-size:10px;color:#a3a3a3;font-family:ui-monospace,Menlo,monospace}
  .r-sm{border-radius:6px}
  .r{border-radius:8px}
  .r-lg{border-radius:12px}
  .r-full{border-radius:9999px}
</style></head>
<body>
<div class="card">
  <div class="col"><div class="shape r-sm"></div><div class="name">6px</div><div class="token">radius-sm</div></div>
  <div class="col"><div class="shape r"></div><div class="name">8px</div><div class="token">radius (button)</div></div>
  <div class="col"><div class="shape r-lg"></div><div class="name">12px</div><div class="token">radius-lg (card)</div></div>
  <div class="col"><div class="shape r-full" style="width:56px;height:24px"></div><div class="name">pill</div><div class="token">radius-full</div></div>
</div>
</body></html>
