<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:28px 32px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{font-family:inherit;font-size:14px;border:none;cursor:pointer;transition:all 150ms;padding:0 14px;height:36px;border-radius:8px}
  .primary{background:#0A0A0A;color:#fff}
  .primary:hover{background:#262626}
  .outline{background:#fff;color:#0A0A0A;border:1px solid #E5E5E5}
  .outline:hover{border-color:#D4D4D4;background:rgba(245,245,245,0.5)}
  .ghost{background:transparent;color:#737373;padding:0 10px}
  .ghost:hover{color:#0A0A0A}
  .lg{height:44px;padding:0 28px;font-size:16px}
  .sm{height:32px;font-size:13px;padding:0 12px}
</style></head>
<body>
<div class="card">
  <button class="primary lg">Get started free</button>
  <button class="primary">New briefing</button>
  <button class="outline">Analyze</button>
  <button class="outline sm">Share</button>
  <button class="ghost">Sign in</button>
</div>
</body></html>
