<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Inter',sans-serif}
  .card{padding:28px 32px;display:flex;align-items:center;gap:24px}
  .wordmark{font-family:'Instrument Serif',serif;font-size:44px;color:#0A0A0A;letter-spacing:-0.015em;line-height:1}
  .meta{display:flex;flex-direction:column;gap:4px}
  .name{font-size:13px;font-weight:500;color:#0A0A0A}
  .desc{font-size:12px;color:#737373;line-height:1.5;max-width:280px}
</style>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="wordmark">Bartlett</div>
  <div class="meta">
    <div class="name">Wordmark</div>
    <div class="desc">Instrument Serif, 400. No glyph, no container. Sits at text-xl in nav, text-5xl on auth pages.</div>
  </div>
</div>
</body></html>
